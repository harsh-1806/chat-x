chatroom {
    server {
        port = 9090
        port = ${?CHAT_SERVER_PORT}

        health-port = 8081
        health-port = ${?CHAT_HEALTH_PORT}

        max-connections = 10000
        max-connections = ${?CHAT_MAX_CONNECTIONS}

        max-rooms = 100
        max-rooms = ${?CHAT_MAX_ROOMS}

        default-room = "general"

        heartbeat {
            interval-seconds = 30
            timeout-seconds = 10
        }

        rate-limit {
            messages-per-second = 10
            messages-per-second = ${?CHAT_RATE_LIMIT}

            burst-size = 20
            burst-size = ${?CHAT_RATE_BURST}
        }

        cache {
            message-history-size = 100
            message-history-ttl-minutes = 60
        }
    }
}
